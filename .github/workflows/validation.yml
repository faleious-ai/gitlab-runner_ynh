name: Validation

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Compile Python sources
        run: python -m py_compile scripts/autoupdate.py scripts/secret_scan.py tests/test_autoupdate.py
      - name: Run unit and negative tests
        run: python -m unittest discover -s tests -v
      - name: Scan current tree for credential-like values
        run: python scripts/secret_scan.py .
      - name: Validate JSON and TOML documents
        run: >-
          python -c "import json, pathlib, tomllib; [json.loads(p.read_text()) for p in pathlib.Path('.').rglob('*.json') if '.git' not in p.parts]; [tomllib.loads(p.read_text()) for p in pathlib.Path('.').rglob('*.toml') if '.git' not in p.parts]"
      - name: Validate Bash scripts
        run: bash -n scripts/_register.sh scripts/actions/register scripts/config scripts/install scripts/restore
      - name: Validate release fixture without network
        run: >-
          python scripts/autoupdate.py check
          --fixture scripts/autoupdate/fixtures/release-v19.0.1.json
          --manifest manifest.toml
          --report "$RUNNER_TEMP/gitlab-runner-candidate.json"
      - name: Generate candidate outside the repository
        run: >-
          python scripts/autoupdate.py generate
          --fixture scripts/autoupdate/fixtures/release-v19.0.1.json
          --output "$RUNNER_TEMP/gitlab-runner-candidate.toml"
          --report "$RUNNER_TEMP/gitlab-runner-manifest-diff.json"
          --write
      - name: Confirm candidate diff allowlist
        run: >-
          python -c "import json, pathlib; r=json.loads(pathlib.Path(r'$RUNNER_TEMP/gitlab-runner-manifest-diff.json').read_text()); assert r['changed_fields']==['amd64.sha256','amd64.url','arm64.sha256','arm64.url','armhf.sha256','armhf.url','sha256','url','version']; assert r['promoted'] is False"
      - name: Confirm dry-run did not promote the manifest
        run: git diff --exit-code -- manifest.toml
