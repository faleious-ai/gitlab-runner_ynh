version = "1.0"

[main]
name.en = "GitLab Runner"
name.fr = "GitLab Runner"

    [main.registration]
    name.en = "Registration"
    name.fr = "Enregistrement"

        [main.registration.gitlab_url]
        ask.en = "GitLab coordinator URL"
        ask.fr = "URL du coordinateur GitLab"
        type = "url"
        bind = "null"
        example = "https://gitlab.com/"

        [main.registration.token]
        ask.en = "Ephemeral Runner authentication token"
        ask.fr = "Jeton d'authentification Runner éphémère"
        type = "password"
        bind = "null"
        example = "glrt-..."

        [main.registration.docker_image]
        ask.en = "Docker image"
        ask.fr = "Image Docker"
        type = "string"
        bind = "null"
        default = "alpine:3.20"

        [main.registration.register]
        ask.en = "Register configured runners"
        ask.fr = "Enregistrer les runners configurés"
        type = "button"
        style = "success"
        help.en = "Registers the GitLab URL entered for this action; the authentication token is not stored."
        help.fr = "Enregistre l'URL GitLab saisie pour cette action ; le jeton d'authentification n'est pas stocké."
